# =============================================================================
# infra/keycloak-values.yaml
#
# Chart: bitnami/keycloak
# Versão alvo: Keycloak 26.x (compatível com Camunda 8.9)
#
# Por que Keycloak externo ao chart Camunda?
# A partir do 8.9, o Keycloak não é mais provisionado como sub-chart do
# Camunda por padrão. Em produção você usaria um Keycloak Operator ou uma
# instância gerenciada. Aqui provisionamos via chart bitnami/keycloak no
# namespace camunda-infra, separado do Camunda.
#
# Imagem compatível com Camunda 8.9 (version matrix):
#   registry.camunda.cloud/camunda/keycloak:26.3.3 (community)
#   registry.camunda.cloud/keycloak-ee/keycloak:26.5.6 (enterprise)
#
# Para ambiente local usamos a imagem community pública do Keycloak
# diretamente (quay.io/keycloak/keycloak ou bitnami/keycloak)
#
# O Keycloak é o Identity Provider (IdP) do Camunda. Ele gerencia:
# - Autenticação SSO de todos os componentes (Operate, Tasklist, etc.)
# - Tokens JWT que os componentes trocam entre si
# - Usuários, grupos e roles da plataforma
# =============================================================================

# ----------------------------------------------------------------------------
# Configuração do realm e admin
# O Identity do Camunda vai se conectar ao Keycloak e configurar
# automaticamente o realm "camunda-platform" no primeiro boot
# ----------------------------------------------------------------------------
auth:
  adminUser: "admin"
  adminPassword: "admin-secret"

# ----------------------------------------------------------------------------
# Configuração do Keycloak
# proxy: edge = o Keycloak está atrás de um proxy/ingress que termina TLS
# Para local sem TLS real, usamos "edge" para evitar redirect loops
# ----------------------------------------------------------------------------
extraEnvVars:
  # Modo de proxy — necessário quando há um reverse proxy na frente
  # "edge": Keycloak confia nos headers X-Forwarded-* do proxy
  - name: KC_PROXY
    value: "edge"
  # Desabilita HTTPS obrigatório para ambiente local
  # NUNCA use em produção — em prod o Keycloak exige HTTPS
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"
  # Log level — debug é útil para troubleshooting local
  - name: KC_LOG_LEVEL
    value: "INFO"

# ----------------------------------------------------------------------------
# Banco de dados — Keycloak precisa de um banco relacional
# Usamos o PostgreSQL do Identity (mesmo banco, schema separado)
#
# ATENÇÃO: Aqui fazemos uma exceção ao modelo "instância por componente":
# o Keycloak é gerenciado pelo Identity do Camunda em termos de realm/config,
# mas o banco do Keycloak é separado do banco do Identity.
# Para simplificar localmente, o Keycloak usa o mesmo servidor PostgreSQL
# do Identity mas com um database diferente ("keycloak").
#
# Em produção: instância RDS separada para o Keycloak.
# ----------------------------------------------------------------------------
postgresql:
  # Usamos PostgreSQL externo (o que instalamos para o Identity)
  enabled: false

externalDatabase:
  host: "postgresql-identity.camunda-infra.svc.cluster.local"
  port: 5432
  database: "keycloak"
  user: "identity"
  password: "identity-secret"
  # O banco "keycloak" precisa existir — vamos criá-lo via initdbScripts abaixo
  # OU podemos usar o mesmo usuário do Identity que já tem acesso ao servidor

# Script de inicialização para criar o banco keycloak no PostgreSQL do Identity
# Isso roda uma vez quando o chart é instalado
# NOTA: Este approach funciona porque o usuário "identity" tem permissão
# de criar databases (CREATEDB) — precisamos garantir isso na criação do PG
# Alternativa mais limpa: criar o banco manualmente via psql após instalar o PG
initdbScripts: {}
# Se precisar criar o banco automaticamente, descomente:
# create-keycloak-db.sh: |
#   #!/bin/bash
#   PGPASSWORD=$POSTGRESQL_PASSWORD psql -h $POSTGRESQL_HOST -U $POSTGRESQL_USERNAME \
#     -c "CREATE DATABASE keycloak;" || true

# ----------------------------------------------------------------------------
# Recursos — Keycloak é relativamente leve em idle, mas pesa no startup
# (JVM + inicialização do realm)
# ----------------------------------------------------------------------------
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# Apenas 1 réplica para local
replicaCount: 1

# ----------------------------------------------------------------------------
# Persistência — Keycloak em si é stateless (o estado fica no banco)
# Não precisamos de PVC para o Keycloak diretamente
# ----------------------------------------------------------------------------
persistence:
  enabled: false

# ----------------------------------------------------------------------------
# Service — ClusterIP interno
# O Identity vai conectar via:
# keycloak.camunda-infra.svc.cluster.local:80
# ----------------------------------------------------------------------------
service:
  type: ClusterIP
  ports:
    http: 80
    https: 443

# ----------------------------------------------------------------------------
# Ingress — desabilitado para local (acesso via port-forward se necessário)
# Para acessar a UI admin do Keycloak:
# kubectl -n camunda-infra port-forward svc/keycloak 8080:80
# URL: http://localhost:8080
# ----------------------------------------------------------------------------
ingress:
  enabled: false

# Probe de readiness — Keycloak demora para inicializar (JVM + DB migrations)
readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

# ----------------------------------------------------------------------------
# Cache — Keycloak usa Infinispan para cache de sessões
# Para single-node local, usamos modo local (sem cluster de cache)
# Em produção com múltiplas réplicas: usar modo distributed ou replicated
# ----------------------------------------------------------------------------
cache:
  # stack: "local" para single-node, "kubernetes" para múltiplas réplicas
  stack: "local"
