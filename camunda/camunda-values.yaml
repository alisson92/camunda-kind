# ===========================================================================
# OPTIMIZE — Análise e relatórios de performance de processos
# Consome dados do Elasticsearch para gerar dashboards e KPIs
# Usa PostgreSQL para armazenar configurações de relatórios/dashboards
# ===========================================================================
optimize:
  enabled: true

  replicas: 1

  image:
    repository: "camunda/optimize"
    tag: "8.9.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "300m"
      # Optimize precisa de pelo menos 1.5Gi para o JVM inicializar sem OOM.
      # 1Gi era insuficiente: JVM heap (75%) = 768Mi + overhead non-heap → OOMKilled.
      memory: "1536Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  javaOpts: >-
    -XX:MaxRAMPercentage=75.0
    -XX:+UseZGC
    -XX:+ExitOnOutOfMemoryError

  # A partir do chart 14.0.0 / Camunda 8.9, o Optimize não usa mais PostgreSQL.
  # O estado dos dashboards/relatórios é armazenado no Elasticsearch.
  # A configuração correta usa optimize.database.elasticsearch (não optimize.elasticsearch).
  database:
    elasticsearch:
      enabled: true
      external: true
      url:
        protocol: "http"
        host: "camunda-elasticsearch-master.camunda-infra.svc.cluster.local"
        port: 9200

  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

  service:
    type: ClusterIP
    port: 80
    managementPort: 8092

  ingress:
    enabled: false

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podDisruptionBudget:
    enabled: false


# ===========================================================================
# IDENTITY — Gerenciamento de identidades, permissões e integração SSO
# Configura e mantém o realm no Keycloak, registra todos os componentes
# como clients OAuth2, e controla RBAC da plataforma
# ===========================================================================
identity:
  enabled: true

  replicas: 1

  image:
    repository: "camunda/identity"
    tag: "8.9.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  javaOpts: >-
    -XX:MaxRAMPercentage=75.0
    -XX:+UseZGC
    -XX:+ExitOnOutOfMemoryError

  # Configuração do PostgreSQL externo para o Identity.
  # A partir do chart 14.0.0, o caminho correto é identity.externalDatabase
  # (sem o prefixo postgresql. que existia em versões anteriores).
  # "password" foi removido — use secret.inlineSecret para local/dev.
  externalDatabase:
    host: "postgresql-identity.camunda-infra.svc.cluster.local"
    port: 5432
    database: "identity"
    username: "identity"
    secret:
      inlineSecret: "identity-secret"

  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

  service:
    type: ClusterIP
    port: 80
    managementPort: 8082

  ingress:
    enabled: false

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podDisruptionBudget:
    enabled: false

  firstUser:
    # Usuário padrão criado automaticamente para acessar a plataforma
    # Usado para login no Operate, Tasklist, etc.
    enabled: true
    username: "demo"
    email: "demo@local.dev"
    firstName: "Demo"
    lastName: "User"
    # A partir do chart 14.0.0, 'password' foi removido e substituído por 'secret'.
    # Para local/dev: use inlineSecret (plain-text).
    # Para produção: use existingSecret + existingSecretKey apontando para um K8s Secret.
    secret:
      inlineSecret: "demo"


# ===========================================================================
# WEB MODELER — Editor BPMN/DMN/Form online integrado à plataforma
# Permite modelar processos diretamente no browser e fazer deploy para o Zeebe
# Composto por 3 serviços: restapi, webapp, websockets
# ===========================================================================
webModeler:
  enabled: true

  image:
    # O Web Modeler tem imagens separadas para cada sub-serviço
    pullPolicy: IfNotPresent

  restapi:
    image:
      repository: "camunda/web-modeler-restapi"
      tag: "8.9.0"
    resources:
      requests:
        cpu: "200m"
        # Web Modeler restapi (Scala/Spring) precisa de mais memória para inicializar
        # 512Mi causava OOMKilled — aumentado para 1Gi
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

    # Configuração de e-mail — obrigatória pelo chart mesmo que emails não sejam enviados.
    # Para local Kind não há SMTP real; o Web Modeler sobe normalmente mas não envia notificações.
    # Em produção: aponte para um SMTP real (SES, SendGrid, etc.)
    # ATENÇÃO: a partir do chart 14.0.0, as chaves são FLAT (smtpHost, smtpPort),
    # não aninhadas sob smtp.host/smtp.port como em versões anteriores.
    mail:
      fromAddress: "noreply@camunda.local"
      fromName: "Camunda Platform (local)"
      smtpHost: "localhost"
      smtpPort: 25
      smtpTlsEnabled: false  # sem TLS em ambiente local

    # PostgreSQL externo para o Web Modeler.
    # A partir do chart 14.0.0: "user" → "username" e "password" foi removido.
    # Use secret.inlineSecret para ambiente local; existingSecret em produção.
    externalDatabase:
      host: "postgresql-webmodeler.camunda-infra.svc.cluster.local"
      port: 5432
      database: "webmodeler"
      username: "webmodeler"
      secret:
        inlineSecret: "webmodeler-secret"

    # Pusher — usado pelo WebSocket do Web Modeler para broadcast de eventos.
    # Valores fixos garantem que helm upgrade não quebre as conexões WebSocket
    # (sem valores fixos, o chart gera secrets aleatórios a cada upgrade).
    # Para local: valores arbitrários são suficientes. Produção: use existingSecret.
    pusher:
      secret:
        inlineSecret: "wm-pusher-secret-local"
      client:
        secret:
          inlineSecret: "wm-pusher-appkey-local"

  webapp:
    image:
      repository: "camunda/web-modeler-webapp"
      tag: "8.9.0"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  websockets:
    image:
      repository: "camunda/web-modeler-websockets"
      tag: "8.9.0"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

  ingress:
    enabled: false
    webapp:
      enabled: false
    websockets:
      enabled: false


# ===========================================================================
# CONNECTORS — Runtime de conectores para integração com sistemas externos
# Executa conectores HTTP, REST, GraphQL, AWS, GCP, etc.
# ===========================================================================
connectors:
  enabled: true

  replicas: 1

  image:
    repository: "camunda/connectors-bundle"
    tag: "8.9.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Inbound connectors — permite que sistemas externos triggem processos Camunda
  inbound:
    mode: "disabled"  # Para local: desabilita inbound (requer URL pública)
    # Em produção: "credentials" ou "oauth"

  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

  service:
    type: ClusterIP
    port: 8080
    managementPort: 9090

  ingress:
    enabled: false

  nodeSelector: {}
  tolerations: []
  affinity: {}


# ===========================================================================
# ELASTICSEARCH — SUB-CHART DESABILITADO
# Usamos o Elasticsearch externo instalado via elastic/elasticsearch chart
# no namespace camunda-infra
# ===========================================================================
elasticsearch:
  # CRÍTICO: desabilitado — não usar o embutido
  enabled: false


# ===========================================================================
# POSTGRESQL — SUB-CHART DESABILITADO
# Usamos instâncias PostgreSQL externas instaladas separadamente
# no namespace camunda-infra
# ===========================================================================
postgresql:
  # CRÍTICO: desabilitado — não usar o embutido
  enabled: false


# ===========================================================================
# KEYCLOAK — SUB-CHARTS DESABILITADOS
#
# keycloak: sub-chart legado (removido no chart 14.0.0, mantido apenas por
#   compatibilidade com versões muito antigas do chart)
#
# identityKeycloak: sub-chart oficial atual (bitnami/keycloak embutido no chart
#   Camunda). Desabilitado porque usamos o Keycloak externo instalado
#   separadamente no namespace camunda-infra via keycloak-manifest.yaml.
#   A conexão com o Keycloak externo é configurada em global.identity.keycloak.
# ===========================================================================
keycloak:
  # CRÍTICO: desabilitado — sub-chart legado, não usar
  enabled: false

identityKeycloak:
  # CRÍTICO: desabilitado — usamos Keycloak externo (keycloak.camunda-infra.svc.cluster.local)
  # A conexão é configurada em global.identity.keycloak (url, contextPath, auth)
  enabled: false
