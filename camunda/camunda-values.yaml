  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

  service:
    type: ClusterIP
    port: 80
    managementPort: 9600

  ingress:
    enabled: false

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podDisruptionBudget:
    enabled: false

  startupProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    successThreshold: 1
    failureThreshold: 20
    timeoutSeconds: 1

  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    successThreshold: 1
    failureThreshold: 5
    timeoutSeconds: 1

  livenessProbe:
    enabled: true
