# =============================================================================
# configs/kind-cluster-config.yaml
#
# Configuração do cluster Kind para o ambiente Camunda 8.9 local.
#
# Topologia: 1 control-plane + 2 workers
# - control-plane: etcd, kube-apiserver, kube-scheduler, kube-controller-manager
# - workers: onde os pods de carga (Camunda, infra, monitoring) são agendados
#
# Por que 2 workers?
# O kube-prometheus-stack (Prometheus + Grafana + Alertmanager) e a stack Camunda
# somam ~25 pods. Com 1 worker apenas, o scheduler fica sobrecarregado e pods
# entram em Pending por pressão de CPU/memória no nó. 2 workers distribuem a carga.
#
# Versão do node: kindest/node:v1.34.0
# Compatível com Kubernetes 1.34 — validado com Camunda 8.9 + chart 14.0.0.
# =============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: camunda-platform-local

nodes:
  - role: control-plane
    image: kindest/node:v1.34.0

  - role: worker
    image: kindest/node:v1.34.0

  - role: worker
    image: kindest/node:v1.34.0
